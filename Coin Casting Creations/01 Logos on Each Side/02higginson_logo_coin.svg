<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1016 1016" width="1016" height="1016">
  <!-- Higginson Jewelry & Antiques Coin: 4 inch diameter = 101.6mm = 1016px at 10px/mm -->
  <!-- Front: Higginson crescent moon logo | Back: FLAT (for gluing) -->

  <!-- Reeded edge ring (outer) -->
  <circle cx="508" cy="508" r="508" fill="#D4C490"/>
  <circle cx="508" cy="508" r="505" fill="none" stroke="#8B7A2A" stroke-width="1.5"/>

  <!-- Reeded edge pattern (tiny ridges like a quarter) -->
  <g id="reeded-edge" stroke="#B8A44A" stroke-width="1.2">
    <circle cx="508" cy="508" r="503" fill="none" stroke="#A89030" stroke-width="10" stroke-dasharray="3.5,5.2"/>
    <circle cx="508" cy="508" r="497" fill="none" stroke="#C4A93A" stroke-width="2" stroke-dasharray="3.5,5.2" stroke-dashoffset="4.35"/>
  </g>

  <!-- Coin face background -->
  <circle cx="508" cy="508" r="490" fill="#EDE5D0"/>

  <!-- Inner rim bead -->
  <circle cx="508" cy="508" r="470" fill="none" stroke="#B8A44A" stroke-width="4"/>
  <circle cx="508" cy="508" r="465" fill="none" stroke="#C4A93A" stroke-width="1.5"/>

  <!-- ═══ HIGGINSON CRESCENT MOON WITH DIAMOND ═══ -->
  <g transform="translate(508, 320)">
    <!-- Crescent moon - outer arc -->
    <path d="M -130 -20 A 140 140 0 1 1 130 -20" fill="none" stroke="#B08D2A" stroke-width="28" stroke-linecap="round"/>
    <!-- Crescent moon - inner cutout (makes it a crescent) -->
    <path d="M -80 -40 A 100 100 0 1 1 80 -40" fill="#EDE5D0" stroke="none"/>
    <!-- Crescent moon visible shape -->
    <path d="M -130 -20 A 140 140 0 1 1 130 -20 A 100 115 0 1 0 -130 -20 Z"
          fill="#B08D2A" stroke="#8B7620" stroke-width="2"/>
    <!-- Highlight on crescent -->
    <path d="M -115 -40 A 130 130 0 0 1 0 -145" fill="none" stroke="#D4B84A" stroke-width="6" opacity="0.5" stroke-linecap="round"/>

    <!-- Ornate filigree scrollwork on crescent -->
    <!-- Left scroll -->
    <path d="M -90 40 Q -70 20 -55 35 Q -40 50 -55 65 Q -70 75 -85 60"
          fill="none" stroke="#D4B84A" stroke-width="4" opacity="0.7"/>
    <!-- Center scroll -->
    <path d="M -20 55 Q 0 35 20 55 Q 35 70 15 80 Q -15 80 -35 70"
          fill="none" stroke="#D4B84A" stroke-width="4" opacity="0.7"/>
    <!-- Right scroll -->
    <path d="M 55 35 Q 70 20 90 40 Q 100 55 85 65 Q 70 75 55 60"
          fill="none" stroke="#D4B84A" stroke-width="4" opacity="0.7"/>
    <!-- Small dots in filigree -->
    <circle cx="-65" cy="45" r="4" fill="#D4B84A" opacity="0.6"/>
    <circle cx="0" cy="55" r="4" fill="#D4B84A" opacity="0.6"/>
    <circle cx="65" cy="45" r="4" fill="#D4B84A" opacity="0.6"/>

    <!-- Pedestal/base at bottom of crescent center -->
    <rect x="-12" y="10" width="24" height="30" rx="4" fill="#B08D2A" stroke="#8B7620" stroke-width="2"/>

    <!-- Diamond ring circle at center-top -->
    <circle cx="0" cy="-10" r="28" fill="none" stroke="#B08D2A" stroke-width="8"/>

    <!-- Diamond gem -->
    <polygon points="0,-55 -22,-35 0,-12 22,-35" fill="#C8DDE8" stroke="#8AACB8" stroke-width="2"/>
    <!-- Diamond facets -->
    <polygon points="0,-55 -22,-35 0,-40" fill="#D8EAF0" opacity="0.8"/>
    <polygon points="0,-55 22,-35 0,-40" fill="#A0C0D0" opacity="0.7"/>
    <line x1="0" y1="-55" x2="0" y2="-12" stroke="#E0F0F8" stroke-width="1" opacity="0.5"/>

    <!-- Light sparkle at diamond top -->
    <line x1="0" y1="-65" x2="0" y2="-72" stroke="#F8F0D0" stroke-width="2"/>
    <line x1="-7" y1="-62" x2="-12" y2="-67" stroke="#F8F0D0" stroke-width="1.5"/>
    <line x1="7" y1="-62" x2="12" y2="-67" stroke="#F8F0D0" stroke-width="1.5"/>
    <line x1="-5" y1="-56" x2="-10" y2="-56" stroke="#F8F0D0" stroke-width="1.5"/>
    <line x1="5" y1="-56" x2="10" y2="-56" stroke="#F8F0D0" stroke-width="1.5"/>
  </g>

  <!-- "Higginson" in elegant script -->
  <text x="508" y="560"
    font-family="'Brush Script MT', 'Segoe Script', 'Apple Chancery', cursive"
    font-size="90"
    text-anchor="middle"
    fill="#1A1208"
    font-style="italic">Higginson</text>

  <!-- "Jewelry &" -->
  <text x="400" y="640"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52"
    text-anchor="middle"
    fill="#5A5A5A"
    letter-spacing="3">Jewelry &amp;</text>

  <!-- "Antiques" -->
  <text x="620" y="700"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52"
    text-anchor="middle"
    fill="#5A5A5A"
    letter-spacing="3">Antiques</text>

  <!-- Top arc text -->
  <path id="topArc" d="M 140,508 A 370,370 0 0,1 876,508" fill="none"/>
  <text font-family="Palatino, Georgia, serif" font-size="30" fill="#5A4A1A" letter-spacing="5">
    <textPath href="#topArc" startOffset="10%">HIGGINSON JEWELRY &amp; ANTIQUES</textPath>
  </text>

  <!-- Bottom arc: location/year -->
  <path id="bottomArc" d="M 165,620 A 370,370 0 0,0 851,620" fill="none"/>
  <text font-family="Georgia, serif" font-size="26" fill="#5A4A1A" letter-spacing="4">
    <textPath href="#bottomArc" startOffset="22%">EST. 2024 &#10022; UTAH</textPath>
  </text>

  <!-- Year -->
  <text x="508" y="870"
    font-family="Palatino, Georgia, serif"
    font-size="36"
    letter-spacing="8"
    font-weight="700"
    text-anchor="middle"
    fill="#8B7A2A">2026</text>

  <!-- Decorative stars -->
  <text x="165" y="520" font-size="22" fill="#C4A93A" text-anchor="middle">&#10022;</text>
  <text x="851" y="520" font-size="22" fill="#C4A93A" text-anchor="middle">&#10022;</text>

</svg>
