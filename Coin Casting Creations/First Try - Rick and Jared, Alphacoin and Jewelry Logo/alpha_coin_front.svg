<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 635 635" width="635" height="635">
  <!-- Coin front face: 2.5 inch = 63.5mm = 635px at 10px/mm -->

  <!-- Outer coin boundary -->
  <circle cx="317.5" cy="317.5" r="317.5" fill="#f5f0e8" stroke="#8B7A2A" stroke-width="4"/>
  
  <!-- Inner relief border -->
  <circle cx="317.5" cy="317.5" r="290" fill="none" stroke="#8B7A2A" stroke-width="3"/>
  
  <!-- Reeded edge dots (decorative) -->
  <circle cx="317.5" cy="317.5" r="307" fill="none" stroke="#C4A93A" stroke-width="8" stroke-dasharray="6,4"/>

  <!-- Portrait area background -->
  <circle cx="317.5" cy="300" r="195" fill="#e8e0d0" stroke="#C4A93A" stroke-width="2"/>

  <!-- LEFT PORTRAIT — Rick (placeholder silhouette) -->
  <!-- Head -->
  <ellipse cx="240" cy="230" rx="58" ry="65" fill="#C4A93A" opacity="0.7"/>
  <!-- Body/shoulders -->
  <path d="M 160 370 Q 180 290 240 285 Q 300 290 320 370 Z" fill="#C4A93A" opacity="0.7"/>
  <!-- Hair detail (curly) -->
  <ellipse cx="240" cy="175" rx="55" ry="35" fill="#8B7A2A" opacity="0.8"/>
  
  <!-- RIGHT PORTRAIT — Jared (placeholder silhouette) -->
  <!-- Head -->
  <ellipse cx="395" cy="230" rx="58" ry="65" fill="#C4A93A" opacity="0.7"/>
  <!-- Body/shoulders -->
  <path d="M 315 370 Q 335 290 395 285 Q 455 290 475 370 Z" fill="#C4A93A" opacity="0.7"/>
  <!-- Glasses detail -->
  <rect x="365" y="220" width="25" height="16" rx="6" fill="none" stroke="#5A4A1A" stroke-width="3" opacity="0.8"/>
  <rect x="400" y="220" width="25" height="16" rx="6" fill="none" stroke="#5A4A1A" stroke-width="3" opacity="0.8"/>
  <line x1="390" y1="228" x2="400" y2="228" stroke="#5A4A1A" stroke-width="2" opacity="0.8"/>

  <!-- PORTRAIT LABEL -->
  <text x="317.5" y="420"
    font-family="Palatino, Georgia, serif"
    font-size="24"
    letter-spacing="3"
    text-anchor="middle"
    fill="#5A4A1A">RICK  ✦  JARED</text>

  <!-- NOTE: Replace silhouettes above with actual portrait -->
  <!-- by importing your photo as a traced SVG in Fusion 360 -->
  <!-- or use the Insert > Canvas tool to place photo on face -->

  <!-- Top arc text -->
  <path id="topArc" d="M 80,317 A 240,240 0 0,1 555,317" fill="none"/>
  <text font-family="Palatino, Georgia, serif" font-size="26" fill="#1A1208" letter-spacing="5" font-weight="700">
    <textPath href="#topArc" startOffset="8%">ALPHA COIN &amp; JEWELRY</textPath>
  </text>

  <!-- Bottom arc text -->
  <path id="bottomArc" d="M 100,450 A 250,250 0 0,0 535,450" fill="none"/>
  <text font-family="Georgia, serif" font-size="22" fill="#5A4A1A" letter-spacing="3">
    <textPath href="#bottomArc" startOffset="18%">FAIRVIEW, UTAH · EST. 2024</textPath>
  </text>

  <!-- Year stamp -->
  <text x="317.5" y="565"
    font-family="Palatino, Georgia, serif"
    font-size="28"
    letter-spacing="6"
    font-weight="700"
    text-anchor="middle"
    fill="#8B7A2A">2026</text>

  <!-- Corner decorations -->
  <text x="100" y="175" font-size="24" fill="#C4A93A" text-anchor="middle">✦</text>
  <text x="535" y="175" font-size="24" fill="#C4A93A" text-anchor="middle">✦</text>

</svg>
