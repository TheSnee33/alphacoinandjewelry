<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 635 635" width="635" height="635">
  <!-- Coin back face: 2.5 inch = 63.5mm = 635px at 10px/mm -->
  
  <!-- Outer coin boundary -->
  <circle cx="317.5" cy="317.5" r="317.5" fill="#f5f0e8" stroke="#8B7A2A" stroke-width="4"/>
  
  <!-- Inner relief border -->
  <circle cx="317.5" cy="317.5" r="290" fill="none" stroke="#8B7A2A" stroke-width="3"/>
  
  <!-- Reeded edge dots (decorative) -->
  <circle cx="317.5" cy="317.5" r="307" fill="none" stroke="#C4A93A" stroke-width="8" stroke-dasharray="6,4"/>

  <!-- Alpha symbol (stylized coin ring) -->
  <g transform="translate(317.5, 280)">
    <!-- The Alpha O ring shape -->
    <ellipse cx="0" cy="-20" rx="95" ry="90" fill="none" stroke="#C4A93A" stroke-width="28"/>
    <!-- Alpha tail -->
    <path d="M 55 20 Q 90 60 70 100" fill="none" stroke="#C4A93A" stroke-width="28" stroke-linecap="round"/>
    <!-- Ring on top of alpha -->
    <rect x="-12" y="-118" width="24" height="16" rx="8" fill="#C4A93A"/>
    <!-- Diamond gem -->
    <polygon points="0,-170 -30,-140 0,-108 30,-140" fill="#A8BEC4" stroke="#7A9099" stroke-width="2"/>
    <polygon points="0,-170 -30,-140 0,-148" fill="#C8DDE4"/>
    <polygon points="0,-170 30,-140 0,-148" fill="#8AADB6"/>
    <!-- Coin edge ridges on left side of alpha -->
    <line x1="-98" y1="-50" x2="-90" y2="-50" stroke="#8B7A2A" stroke-width="3"/>
    <line x1="-100" y1="-35" x2="-92" y2="-35" stroke="#8B7A2A" stroke-width="3"/>
    <line x1="-100" y1="-20" x2="-92" y2="-20" stroke="#8B7A2A" stroke-width="3"/>
    <line x1="-100" y1="-5" x2="-92" y2="-5" stroke="#8B7A2A" stroke-width="3"/>
    <line x1="-98" y1="10" x2="-90" y2="10" stroke="#8B7A2A" stroke-width="3"/>
  </g>

  <!-- ALPHA text -->
  <text x="317.5" y="430" 
    font-family="Palatino, Georgia, serif" 
    font-size="72" 
    font-weight="700"
    letter-spacing="18"
    text-anchor="middle" 
    fill="#1A1208">ALPHA</text>

  <!-- COIN & JEWELRY text -->
  <text x="317.5" y="495" 
    font-family="Palatino, Georgia, serif" 
    font-size="36" 
    letter-spacing="8"
    text-anchor="middle" 
    fill="#1A1208">COIN &amp; JEWELRY</text>

  <!-- Website arc along bottom -->
  <path id="bottomArc" d="M 100,450 A 250,250 0 0,0 535,450" fill="none"/>
  <text font-family="Georgia, serif" font-size="22" fill="#5A4A1A" letter-spacing="3">
    <textPath href="#bottomArc" startOffset="15%">alphacoinandjewelry.com</textPath>
  </text>

  <!-- Top arc text -->
  <path id="topArc" d="M 80,317 A 240,240 0 0,1 555,317" fill="none"/>
  <text font-family="Georgia, serif" font-size="22" fill="#5A4A1A" letter-spacing="4">
    <textPath href="#topArc" startOffset="12%">.999 FINE SILVER ✦ UTAH, USA</textPath>
  </text>

  <!-- Corner stars -->
  <text x="110" y="340" font-size="20" fill="#C4A93A" text-anchor="middle">✦</text>
  <text x="525" y="340" font-size="20" fill="#C4A93A" text-anchor="middle">✦</text>

</svg>
